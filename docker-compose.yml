version: '3.8'

services:
  rediscover:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: rediscover
    ports:
      - "6377:6377"
    volumes:
      - rediscover-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=6377
      - DATABASE_PATH=/app/data/rediscover.db
      # Set APP_SECRET for production (generate with: openssl rand -hex 32)
      # If not set, a random secret will be generated and persisted in /app/data/.secret
      - APP_SECRET=${APP_SECRET:-}
      # JWT token expiration time (default: 24h)
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6377/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  rediscover-data:
