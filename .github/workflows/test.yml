name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Lint frontend
        run: npm run lint

      - name: TypeScript type check frontend
        run: npx tsc --noEmit

      - name: Lint backend
        run: cd backend && npm run lint || echo "Backend lint script not found, skipping"

      - name: TypeScript type check backend
        run: cd backend && npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run backend tests
        run: cd backend && npm test || echo "Backend tests not found, skipping"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Frontend dist directory not found"
            exit 1
          fi
          echo "Frontend build successful"

      - name: Build backend
        run: cd backend && npm run build

      - name: Verify backend build output
        run: |
          if [ ! -d "backend/dist" ]; then
            echo "Backend dist directory not found"
            exit 1
          fi
          echo "Backend build successful"

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rediscover:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
