name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Add permissions for the GITHUB_TOKEN
permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: mufazmi/rediscover

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"

      - name: Read package.json version
        id: package_version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $PACKAGE_VERSION"

      - name: Validate version match
        run: |
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          PACKAGE_VERSION="${{ steps.package_version.outputs.package_version }}"
          
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            echo ""
            echo "To fix this:"
            echo "1. Update package.json version to match the tag, or"
            echo "2. Delete the tag and create a new one matching package.json version"
            echo ""
            echo "Commands:"
            echo "  npm version $TAG_VERSION --no-git-tag-version"
            echo "  git add package.json backend/package.json"
            echo "  git commit -m 'chore: bump version to $TAG_VERSION'"
            echo "  git tag -d v$TAG_VERSION"
            echo "  git push origin :refs/tags/v$TAG_VERSION"
            echo "  git tag v$TAG_VERSION"
            echo "  git push && git push --tags"
            exit 1
          fi
          
          echo "✅ Version validation successful: $TAG_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.validate.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: echo "Docker image pushed successfully"

  build-npm:
    name: Build NPM Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: cd backend && npm run build

      - name: Create npm package tarball
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: mufazmi-rediscover-${{ needs.validate.outputs.version }}.tgz
          retention-days: 30
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-npm, build-docker] 
    outputs:
      version: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release-artifacts
          
          # Copy npm package
          if [ -f artifacts/npm-package/*.tgz ]; then
            cp artifacts/npm-package/*.tgz release-artifacts/
          fi
          
          ls -lh release-artifacts

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          if [ -n "$(ls -A)" ]; then
            sha256sum * > checksums.txt
            cat checksums.txt
          fi
          cd ..

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          
          # Check if CHANGELOG.md exists
          if [ -f "CHANGELOG.md" ]; then
            # Extract changelog section for this version
            CHANGELOG=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
            
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="Release version ${VERSION}"
            fi
          else
            CHANGELOG="Release version ${VERSION}"
          fi
          
          # Save to file for GitHub release
          echo "$CHANGELOG" > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: cd backend && npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          sleep 10
          npm view @mufazmi/rediscover version
