name: Docker Dev Build

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: mufazmi/rediscover

jobs:
  build-dev:
    name: Build and Push Dev Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:dev
            ${{ env.DOCKER_IMAGE }}:dev-${{ steps.sha.outputs.sha }}
          build-args: |
            VERSION=dev
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Dev image pushed successfully"
          echo "Tags:"
          echo "  - ${{ env.DOCKER_IMAGE }}:dev"
          echo "  - ${{ env.DOCKER_IMAGE }}:dev-${{ steps.sha.outputs.sha }}"
