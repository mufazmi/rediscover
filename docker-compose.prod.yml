version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: rediscover-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rediscover-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health", "||", "exit", "1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
    container_name: rediscover-frontend
    volumes:
      - frontend-dist:/app/dist-volume
    networks:
      - rediscover-network
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist-volume/index.html"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rediscover-backend
    volumes:
      - rediscover-data:/app/data
    networks:
      - rediscover-network
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-6377}
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/rediscover.db}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - APP_SECRET=${APP_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-10}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-6377}/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

networks:
  rediscover-network:
    driver: bridge

volumes:
  rediscover-data:
  frontend-dist: